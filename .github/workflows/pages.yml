name: Daily JCZQ Build & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Beijing 09:30 and 21:30 => UTC 01:30 and 13:30
    - cron: "30 1,13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy scikit-learn requests beautifulsoup4 lxml python-dotenv

      - name: Create .env from Secrets
        run: |
          cat > .env << 'EOF'
          API_FOOTBALL_KEY=${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY=${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}
          OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}
          GEMINI_BASE_URL=${{ secrets.GEMINI_BASE_URL }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}
          ALLOW_GLOBAL_FIXTURE_FALLBACK=false
          EOF

      - name: Run Daily JCZQ Pipeline
        run: |
          python -m src.daily_jczq_pipeline

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
