<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Footy Predict Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="wrap hero">
  <div class="hero-top">
    <div>
      <div class="brand">Footy Predict Pro</div>
      <div class="sub">Poisson+Elo · EV/Kelly · Backtest · GitHub Pages</div>
    </div>
    <button id="theme" class="btn">🌙/☀️</button>
  </div>
  <div id="meta" class="meta">加载中…</div>

  <div class="cards">
    <div class="card"><div class="k">未来赛程</div><div id="k_fx" class="v">-</div></div>
    <div class="card"><div class="k">Top Picks</div><div id="k_top" class="v">-</div></div>
    <div class="card"><div class="k">回测ROI</div><div id="k_roi" class="v">-</div></div>
    <div class="card"><div class="k">回测命中</div><div id="k_hit" class="v">-</div></div>
  </div>
</header>

<main class="wrap">
  <section>
    <h2>Top Picks</h2>
    <div class="hint">只有赛程行带到赔率列时才会算 EV/Kelly。</div>
    <div class="table-wrap">
      <table id="top">
        <thead><tr>
          <th>日期</th><th>联赛</th><th>主队</th><th>客队</th>
          <th>推荐</th><th>评分</th><th>EV</th><th>Kelly</th><th>概率(主/平/客)</th><th>赔率(胜/平/负)</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <section>
    <h2>全部赛程</h2>
    <div class="table-wrap">
      <table id="all">
        <thead><tr>
          <th>日期</th><th>联赛</th><th>主队</th><th>客队</th>
          <th>xG(主/客)</th><th>最可能比分</th><th>状态</th><th>理由</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>

<footer class="wrap footer">仅供学习研究，不构成投注建议。</footer>
<script src="app.js"></script>
</body>
</html>
